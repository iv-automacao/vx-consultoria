  <!-- Favicon SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23080808'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='14' font-weight='700' fill='%23F97316'>FC</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:             #080808;
      --surface:        rgba(255, 255, 255, 0.04);
      --surface-hover:  rgba(255, 255, 255, 0.07);
      --border:         rgba(255, 255, 255, 0.08);
      --border-hover:   #F97316;
      --accent:         #F97316;
      --accent-dim:     rgba(249, 115, 22, 0.15);
      --glow:           rgba(249, 115, 22, 0.18);
      --text-primary:   #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-muted:     rgba(255, 255, 255, 0.30);
      --radius-card:    14px;
      --radius-sm:      8px;
      --transition:     180ms ease-out;
      --max-width:      680px;
    }

    /* ─── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background ─────────────────────────────────────────── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(249,115,22,.12) 0%, transparent 70%);
      animation: glow-pulse 5s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: .7; }
      50%       { opacity: 1; }
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: var(--max-width);
      margin: 0 auto; padding: 0 24px;
    }
    .section { padding: 80px 0; }
    .hero { padding: 100px 0 80px; text-align: center; }

    /* ─── Hero ───────────────────────────────────────────────── */
    .eyebrow {
      display: inline-block;
      font-size: 11px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 20px;
    }
    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1.15; font-weight: 600;
      margin-bottom: 20px;
    }
    .hero-sub {
      font-size: 17px; color: var(--text-secondary);
      max-width: 520px; margin: 0 auto 36px;
      line-height: 1.65;
    }
    .btn-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      padding: 14px 28px; border-radius: 50px;
      text-decoration: none;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(249,115,22,.35);
    }
  </style>
</head>
<body>

  <!-- Camadas de fundo -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <span class="eyebrow">Estruturação Comercial</span>
      <h1 class="hero-headline">Chega de improvisar. Seu time de vendas pode ter processo.</h1>
      <p class="hero-sub">Implementamos CRM, processos e rotinas comerciais em até 90 dias — ou devolvemos 100% do seu investimento.</p>
      <a
        class="btn-cta"
        href="https://wa.me/19047491633?text=Ol%C3%A1+F%C3%A1bio%2C+vim+pela+landing+page+e+quero+estruturar+meu+comercial"
        target="_blank"
        rel="noopener noreferrer"
      >
        Quero estruturar meu comercial
      </a>
    </div>
  </section>

</body>
</html>
