<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fábio Castello Branco</title>
  <meta name="description" content="Especialista em Funil de Vendas — implantação comercial, marketing e treinamento de times." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────── */
    :root {
      --bg:             #080808;
      --surface:        rgba(255, 255, 255, 0.04);
      --border:         rgba(255, 255, 255, 0.08);
      --border-hover:   #F97316;
      --accent:         #F97316;
      --glow:           rgba(249, 115, 22, 0.15);
      --text-primary:   #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.55);
      --icon-bg:        rgba(249, 115, 22, 0.12);
      --radius-card:    14px;
      --radius-icon:    10px;
      --transition:     150ms ease-out;
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100dvh;
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Glow de fundo ─────────────────────────────── */
    .glow-bg {
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse at center, var(--glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Container principal ────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 56px 20px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── Seção de perfil ────────────────────────────── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    /* Avatar com borda gradiente laranja */
    .avatar-wrapper {
      padding: 2px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), rgba(249, 115, 22, 0.3));
    }

    .avatar {
      display: block;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--bg);
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .bio {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <!-- Efeito de fundo -->
  <div class="glow-bg" aria-hidden="true"></div>

  <main class="container">
    <section class="profile">
      <div class="avatar-wrapper">
        <img
          class="avatar"
          src="IMG_3762.JPG.jpeg"
          alt="Foto de Fábio Castello Branco"
          width="92"
          height="92"
        />
      </div>
      <div class="profile-info">
        <h1 class="name">Fábio Castello Branco</h1>
        <p class="title">Especialista em Funil de Vendas</p>
        <p class="bio">Processo comercial que fecha. Funil, CRM e time de vendas que gera resultado.</p>
      </div>
    </section>
  </main>
</body>
</html>
