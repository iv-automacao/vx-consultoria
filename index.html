<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fábio Castello Branco</title>
  <meta name="description" content="Especialista em Funil de Vendas — implantação comercial, marketing e treinamento de times." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────── */
    :root {
      --bg:             #080808;
      --surface:        rgba(255, 255, 255, 0.04);
      --border:         rgba(255, 255, 255, 0.08);
      --border-hover:   #F97316;
      --accent:         #F97316;
      --glow:           rgba(249, 115, 22, 0.15);
      --text-primary:   #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.55);
      --icon-bg:        rgba(249, 115, 22, 0.12);
      --radius-card:    14px;
      --radius-icon:    10px;
      --transition:     150ms ease-out;
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100dvh;
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <p style="color:white;padding:2rem;">ok</p>
</body>
</html>
